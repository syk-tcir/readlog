<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント登録 | ReadLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #e8ede8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #2d5a27;
      margin-bottom: 4px;
    }
    h2 {
      font-size: 14px;
      font-weight: 700;
      color: #555;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #2d5a27;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c5ddc0;
      border-radius: 9px;
      font-size: 14px;
      outline: none;
      background: #f8fbf8;
      transition: border 0.2s;
    }
    .form-group input:focus { border-color: #5a9e4f; }
    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
    }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #5a9e4f, #3a7a2f);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
    .login-link a {
      color: #5a9e4f;
      font-weight: 700;
      text-decoration: none;
    }
    .error-msg {
      background: #fff0f0;
      border: 1px solid #e88;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #c00;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>ReadLog</h1>
  <h2>アカウント登録</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="error-msg">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST" action="{% url 'register' %}">
    {% csrf_token %}
    <div class="form-group">
      <label>名前</label>
      <input type="text" name="username" placeholder="ハム星" value="{{ request.POST.username }}" required>
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" name="email" placeholder="test@test.com" value="{{ request.POST.email }}" required>
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <p class="hint">条件：8文字以上の英数字</p>
      <input type="password" name="password1" required>
    </div>
    <div class="form-group">
      <label>パスワード（確認用）</label>
      <input type="password" name="password2" required>
    </div>
    <button type="submit" class="btn-submit">登録</button>
  </form>

  <div class="login-link">
    すでにアカウントをお持ちの方は <a href="{% url 'login' %}">ログイン</a>
  </div>
</div>
</body>
</html>
