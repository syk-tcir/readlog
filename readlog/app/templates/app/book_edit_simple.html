{% extends 'base.html' %}
{% block content %}
<style>
  .edit-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }

  .edit-wrap h2 {
    font-size: 16px;
    font-weight: 800;
    color: #2d5a27;
    margin-bottom: 16px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #5a9e4f;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    margin-bottom: 16px;
  }

  /* 書籍プレビュー */
  .book-preview {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    background: #f0f8ee;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
    border: 1px solid #d0e8cc;
  }

  .book-preview-cover {
    width: 64px;
    height: 88px;
    border-radius: 7px;
    overflow: hidden;
    background: #ddeedd;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    border: 1px solid #cce0cc;
  }

  .book-preview-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .book-preview-info h3 {
    font-size: 14px;
    font-weight: 800;
    color: #1a3d17;
    line-height: 1.4;
  }

  .book-preview-info p {
    font-size: 12px;
    color: #5a7a55;
    margin-top: 4px;
  }

  /* フォーム */
  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #2d5a27;
    margin-bottom: 6px;
  }

  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 9px;
    border: 1.5px solid #c5ddc0;
    font-size: 13px;
    background: #f8fbf8;
    outline: none;
    font-family: inherit;
    transition: border 0.2s;
  }

  .form-group select:focus { border-color: #5a9e4f; }

  /* ボタン */
  .action-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-update {
    flex: 2;
    padding: 13px;
    background: linear-gradient(135deg, #5a9e4f, #3a7a2f);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }

  .btn-delete {
    flex: 1;
    padding: 13px;
    background: #e53935;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }
</style>

<div class="edit-wrap">
  <a class="back-link" href="{% url 'book_detail' book.id %}">← 詳細に戻る</a>
  <h2>📝 本を編集する</h2>

  <!-- 書籍プレビュー（編集不可） -->
  <div class="book-preview">
    <div class="book-preview-cover">
      {% if book.thumbnail_url %}
        <img src="{{ book.thumbnail_url }}" alt="{{ book.title }}">
      {% else %}
        📚
      {% endif %}
    </div>
    <div class="book-preview-info">
      <h3>{{ book.title }}</h3>
      <p>{{ book.author }}</p>
    </div>
  </div>

  <!-- 編集フォーム -->
  <form method="POST" action="{% url 'book_edit' book.id %}">
    {% csrf_token %}

    <!-- 分類変更 -->
    <div class="form-group">
      <label>分類変更</label>
      <select name="category">
        <option value="reading" {% if book.category == 'reading' %}selected{% endif %}>📖 読んでる本</option>
        <option value="stacked" {% if book.category == 'stacked' %}selected{% endif %}>📦 積読本</option>
        <option value="want" {% if book.category == 'want' %}selected{% endif %}>🔖 読みたい本</option>
        <option value="read">📚 読んだ本</option>
      </select>
    </div>

    <div class="action-buttons">
      <button type="submit" class="btn-update">更新する</button>
      <button type="button" class="btn-delete" onclick="confirmDelete()">削除</button>
    </div>
  </form>
</div>

<!-- 削除確認フォーム -->
<form id="delete-form" method="POST" action="{% url 'book_delete' book.id %}" style="display:none;">
  {% csrf_token %}
</form>

<script>
  function confirmDelete() {
    if (confirm('「{{ book.title|escapejs }}」を削除しますか？\nこの操作は取り消せません。')) {
      document.getElementById('delete-form').submit();
    }
  }
</script>

{% endblock %}
