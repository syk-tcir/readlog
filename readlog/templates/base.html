<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadLog</title>
    <style>
        body { 
            margin: 0; 
            padding-bottom: 80px;
            font-family: sans-serif;
            background-color: #f9f9f9;
        }

        .content-section { display: none; }
        .active { display: block; }

        header {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 70px; background-color: #d8e4bc;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #c0cfa1; z-index: 1000;
        }

        .nav-item {
            background: none; border: none; color: #555;
            font-size: 11px; cursor: pointer; flex: 1; text-align: center;
        }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .active-btn { color: #2d5a27; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="{% url 'home' %}" style="text-decoration: none; font-weight: bold; color: #333;">ReadLog</a>
        {% if user.is_authenticated %}
            <div style="font-size: 12px;">
                {{ user.username }}さん 
                <button onclick="document.getElementById('logout-form').submit()" 
                        style="background: none; border: none; color: #888; text-decoration: underline; font-size: 11px; cursor: pointer;">
                    ログアウト
                </button>
            </div>
        {% else %}
            <a href="{% url 'login' %}" style="font-size: 12px;">ログイン</a>
        {% endif %}
    </header>

    <form id="logout-form" action="{% url 'logout' %}" method="post" style="display:none;">
        {% csrf_token %}
    </form>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% if user.is_authenticated %}
    <nav class="bottom-nav">
        <a class="nav-item active-btn" href="{% url 'home' %}" style="text-decoration:none;">
            <span class="nav-icon">🏠</span>ホーム
        </a>
        <a class="nav-item" href="{% url 'home' %}?section=books" style="text-decoration:none;">
            <span class="nav-icon">📚</span>本
        </a>
        <a class="nav-item" href="{% url 'home' %}?section=search" style="text-decoration:none;">
            <span class="nav-icon">🔍</span>検索
        </a>
        <a class="nav-item" href="{% url 'mypage' %}" style="text-decoration:none;">
            <span class="nav-icon">😊</span>マイページ
        </a>
    </nav>

    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll('.content-section');
            if (sections.length > 0) {
                sections.forEach(s => s.style.display = 'none');
                const target = document.getElementById(sectionId + '-section');
                if (target) target.style.display = 'block';
                const buttons = document.querySelectorAll('.nav-item');
                buttons.forEach(b => b.classList.remove('active-btn'));
                document.getElementById('btn-' + sectionId).classList.add('active-btn');
                history.replaceState(null, '', '?section=' + sectionId);
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const section = params.get('section');
            const query = params.get('q');

            if (section === 'books') {
                showSection('books');
            } else if (query) {
                showSection('search');
            } else if (section) {
                showSection(section);
            } else {
                showSection('home');
            }
        });
    </script>
    {% endif %}

</body>
</html>
