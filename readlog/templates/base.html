<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadLog</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            padding-top: 50px;
            padding-bottom: 80px;
            font-family: sans-serif;
            background-color: #f9f9f9;
            height: 100vh;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .content-section { display: none; }
        .active { display: block; }

        header {
            position: fixed; /* ③ 固定 */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 70px; background-color: #d8e4bc;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #c0cfa1; z-index: 1000;
        }

        .nav-item {
            background: none; border: none; color: #555;
            font-size: 11px; cursor: pointer; flex: 1; text-align: center;
        }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .active-btn { color: #2d5a27; font-weight: bold; }

        /* ② モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px 24px;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
        }
        .modal-box p {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-cancel {
            padding: 10px 20px;
            border: 1.5px solid #ccc;
            border-radius: 10px;
            background: #fff;
            color: #555;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .modal-confirm {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #e53935;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <span style="font-weight: bold; color: #333;">ReadLog</span>
    </header>

    <form id="logout-form" action="{% url 'logout' %}" method="post" style="display:none;">
        {% csrf_token %}
    </form>

    <!-- ② ログアウト確認モーダル -->
    <div class="modal-overlay" id="logout-modal">
        <div class="modal-box">
            <p>ログアウトしますか？</p>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeLogoutModal()">キャンセル</button>
                <button class="modal-confirm" onclick="document.getElementById('logout-form').submit()">ログアウト</button>
            </div>
        </div>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% if user.is_authenticated %}
    <nav class="bottom-nav">
        <a class="nav-item active-btn" href="{% url 'home' %}" style="text-decoration:none;">
            <span class="nav-icon">🏠</span>ホーム
        </a>
        <a class="nav-item" href="{% url 'home' %}?section=books" style="text-decoration:none;">
            <span class="nav-icon">📚</span>本
        </a>
        <a class="nav-item" href="{% url 'home' %}?section=search" style="text-decoration:none;">
            <span class="nav-icon">🔍</span>検索
        </a>
        <a class="nav-item" href="{% url 'mypage' %}" style="text-decoration:none;">
            <span class="nav-icon">😊</span>マイページ
        </a>
    </nav>

    <script>
        function openLogoutModal() {
            document.getElementById('logout-modal').classList.add('open');
        }
        function closeLogoutModal() {
            document.getElementById('logout-modal').classList.remove('open');
        }

        function showSection(sectionId) {
            const sections = document.querySelectorAll('.content-section');
            if (sections.length > 0) {
                sections.forEach(s => s.style.display = 'none');
                const target = document.getElementById(sectionId + '-section');
                if (target) target.style.display = 'block';
                const buttons = document.querySelectorAll('.nav-item');
                buttons.forEach(b => b.classList.remove('active-btn'));
                document.getElementById('btn-' + sectionId).classList.add('active-btn');
                history.replaceState(null, '', '?section=' + sectionId);
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const section = params.get('section');
            const query = params.get('q');

            if (section === 'books') {
                showSection('books');
            } else if (query) {
                showSection('search');
            } else if (section) {
                showSection(section);
            } else {
                showSection('home');
            }
        });
    </script>
    {% endif %}

</body>
</html>
