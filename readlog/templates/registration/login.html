<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | ReadLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #e8ede8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 { font-size: 24px; font-weight: 900; color: #2d5a27; margin-bottom: 4px; }
    h2 { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #2d5a27;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c5ddc0;
      border-radius: 9px;
      font-size: 14px;
      outline: none;
      background: #f8fbf8;
      transition: border 0.2s;
    }
    .form-group input:focus { border-color: #5a9e4f; }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #5a9e4f, #3a7a2f);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    .error-msg {
      background: #fff0f0;
      border: 1px solid #e88;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #c00;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .links {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: center;
      font-size: 13px;
    }
    .links a { color: #1a73e8; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>ReadLog</h1>
  <h2></h2>

  {% if form.errors %}
    <div class="error-msg">メールアドレスまたはパスワードが正しくありません</div>
  {% endif %}

  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" name="username" placeholder="mail@example.com" required>
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn-submit">ログイン</button>
  </form>

  <div class="links">
    <p>パスワードを忘れた方は<a href="{% url 'password_reset' %}">こちら</a></p>
    <p>アカウント登録は<a href="{% url 'register' %}">こちら</a></p>
  </div>
</div>
</body>
</html>
