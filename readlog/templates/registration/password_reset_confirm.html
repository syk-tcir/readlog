<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新しいパスワードを設定 | ReadLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #e8ede8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 { font-size: 24px; font-weight: 900; color: #2d5a27; margin-bottom: 20px; }
    h2 { font-size: 15px; font-weight: 800; color: #333; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #2d5a27;
      margin-bottom: 6px;
    }
    .hint { font-size: 11px; color: #aaa; margin-top: 3px; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c5ddc0;
      border-radius: 9px;
      font-size: 14px;
      outline: none;
      background: #f8fbf8;
    }
    .form-group input:focus { border-color: #5a9e4f; }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #5a9e4f, #3a7a2f);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    .error-list {
      background: #fff0f0;
      border: 1px solid #e88;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #c00;
      margin-bottom: 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>ReadLog</h1>
  <h2>パスワード再設定</h2>

  {% if validlink %}
    {% if form.errors %}
      <div class="error-list">
        {% for field in form %}
          {% for error in field.errors %}
            <div>{{ error }}</div>
          {% endfor %}
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>新しいパスワード</label>
        <p class="hint">条件：8文字以上の英数字</p>
        <input type="password" name="new_password1" required>
      </div>
      <div class="form-group">
        <label>新しいパスワード（確認用）</label>
        <input type="password" name="new_password2" required>
      </div>
      <button type="submit" class="btn-submit">登録</button>
    </form>
  {% else %}
    <div class="error-list">
      このリンクは無効または期限切れです。もう一度パスワード再設定をお試しください。
    </div>
    <a href="{% url 'password_reset' %}" style="color:#5a9e4f;font-weight:700;">パスワード再設定へ</a>
  {% endif %}
</div>
</body>
</html>
