<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メール送信完了 | ReadLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #e8ede8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 900; color: #2d5a27; margin-bottom: 8px; }
    h2 { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: block;
      padding: 13px;
      background: linear-gradient(135deg, #5a9e4f, #3a7a2f);
      color: #fff;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📧</div>
  <h1>ReadLog</h1>
  <h2>メールを送信しました</h2>
  <p>パスワード再設定用のURLを<br>メールアドレスに送信しました。<br>メールをご確認ください。</p>
  <a class="btn" href="{% url 'login' %}">ログイン画面へ</a>
</div>
</body>
</html>
