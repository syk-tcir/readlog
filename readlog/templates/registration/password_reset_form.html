<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード再設定 | ReadLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #e8ede8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 { font-size: 24px; font-weight: 900; color: #2d5a27; margin-bottom: 20px; }
    h2 { font-size: 15px; font-weight: 800; color: #333; margin-bottom: 16px; }
    .info-box {
      background: #fefbe8;
      border: 1px solid #e8d870;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .error-box {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #2d5a27;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c5ddc0;
      border-radius: 9px;
      font-size: 14px;
      outline: none;
      background: #f8fbf8;
    }
    .form-group input:focus { border-color: #5a9e4f; }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #5a9e4f, #3a7a2f);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    .back-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
    }
    .back-link a { color: #5a9e4f; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>ReadLog</h1>
  <h2>パスワード再設定</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="error-box">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <div class="info-box">登録メールアドレスを入力してください。</div>

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" name="email" placeholder="test@test.com" required>
    </div>
    <button type="submit" class="btn-submit">送信</button>
  </form>

  <div class="back-link">
    <a href="{% url 'login' %}">← ログイン画面へ戻る</a>
  </div>
</div>
</body>
</html>
